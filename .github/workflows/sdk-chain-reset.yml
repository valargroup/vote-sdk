# Reset the deployed 3-validator chain: stop, reinitialize, start, register.
# When reset_chain is false, just restarts services without wiping state.

name: Reset SDK chain

on:
  workflow_dispatch:
    inputs:
      reset_chain:
        description: "Wipe and reinitialize all validator data before starting"
        type: boolean
        default: true
  workflow_call:
    inputs:
      reset_chain:
        type: boolean
        default: false

permissions:
  contents: read

env:
  DEPLOY_PATH: /opt/shielded-vote

jobs:
  reset:
    name: Reset chain
    runs-on: ubuntu-latest
    steps:
      - name: Stop services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            for svc in svoted-archive svoted-val1 svoted-val2 svoted-val3; do
              sudo systemctl stop "$svc" || true
            done
            sudo pkill -9 -x svoted || true
            for i in $(seq 1 20); do
              if ! ss -tlnp | grep -qE ':26156|:26256|:26356|:26456|:6160|:6260|:6360|:6460|:3000'; then
                echo "Ports freed"
                break
              fi
              if [ "$i" = "20" ]; then
                echo "WARN: ports still bound after 20s, forcing..."
                sudo fuser -k 26156/tcp 26256/tcp 26356/tcp 26456/tcp 6160/tcp 6260/tcp 6360/tcp 6460/tcp 3000/tcp || true
                sleep 1
              fi
              sleep 1
            done

      - name: Install updated systemd units
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            for i in 1 2 3; do
              src="${{ env.DEPLOY_PATH }}/docs/svoted-val${i}.service"
              if [ -f "$src" ]; then
                sudo cp "$src" /etc/systemd/system/svoted-val${i}.service
              fi
            done
            if [ -f "${{ env.DEPLOY_PATH }}/docs/svoted-archive.service" ]; then
              sudo cp "${{ env.DEPLOY_PATH }}/docs/svoted-archive.service" /etc/systemd/system/svoted-archive.service
              sudo systemctl enable svoted-archive
            fi
            sudo systemctl daemon-reload

      - name: Reinitialize all validators
        if: ${{ inputs.reset_chain == true }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          envs: VM_PRIVKEY,SVOTE_HELPER_SENTRY_DSN
          script: |
            export HOME=${{ env.DEPLOY_PATH }} PATH=${{ env.DEPLOY_PATH }}:$PATH
            export VM_PRIVKEY="$VM_PRIVKEY"
            export SVOTE_HELPER_SENTRY_DSN="$SVOTE_HELPER_SENTRY_DSN"
            chmod +x ${{ env.DEPLOY_PATH }}/svoted ${{ env.DEPLOY_PATH }}/create-val-tx
            bash ${{ env.DEPLOY_PATH }}/init_multi.sh --ci
            bash ${{ env.DEPLOY_PATH }}/init-archive.sh
        env:
          VM_PRIVKEY: ${{ secrets.VM_PRIVKEY }}
          SVOTE_HELPER_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

      - name: Start services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            for svc in svoted-val1 svoted-val2 svoted-val3; do
              sudo systemctl start "$svc"
            done
            if [ -d "${{ env.DEPLOY_PATH }}/.svoted-archive" ]; then
              sudo systemctl start svoted-archive
            else
              echo "NOTE: ${{ env.DEPLOY_PATH }}/.svoted-archive does not exist yet — skipping archive start."
              echo "      Run this workflow with reset_chain=true to initialize the archive."
            fi

      - name: Register post-genesis validators
        if: ${{ inputs.reset_chain == true }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            export HOME=${{ env.DEPLOY_PATH }} PATH=${{ env.DEPLOY_PATH }}:$PATH
            for i in $(seq 1 30); do
              if curl -sf http://127.0.0.1:1418/shielded-vote/v1/rounds > /dev/null 2>&1; then
                echo "Val1 API ready"
                break
              fi
              if [ "$i" = "30" ]; then
                echo "FAIL: val1 API not responding after 60s"
                echo "--- curl -v (last attempt) ---"
                curl -v --max-time 5 http://127.0.0.1:1418/shielded-vote/v1/rounds || true
                echo "--- systemctl status svoted-val1 ---"
                sudo systemctl status svoted-val1 --no-pager || true
                echo "--- listening ports ---"
                sudo ss -tlnp | grep -E ':1418|:1518|:1618|:1317|:26157|:3000' || echo "(none matched)"
                echo "--- app.toml [api] section ---"
                sed -n '/\[api\]/,/^\[/p' "$HOME/.svoted-val1/config/app.toml"
                echo "--- app.toml [pir] section ---"
                sed -n '/\[pir\]/,/^\[/p' "$HOME/.svoted-val1/config/app.toml"
                echo "--- svoted-val1 unit file (as installed) ---"
                cat /etc/systemd/system/svoted-val1.service || true
                echo "--- journal: full since svoted-val1 last (re)start ---"
                # InactiveExitTimestamp is when the unit last transitioned to active.
                since_ts=$(systemctl show -p InactiveExitTimestamp --value svoted-val1.service)
                if [ -n "$since_ts" ]; then
                  sudo journalctl -u svoted-val1 --no-pager --since "$since_ts"
                else
                  sudo journalctl -u svoted-val1 --no-pager -n 500
                fi
                exit 1
              fi
              sleep 2
            done
            ${{ env.DEPLOY_PATH }}/svoted tx vote register-pallas-key \
              --from validator --keyring-backend test \
              --home "$HOME/.svoted-val1" \
              --chain-id svote-1 --node tcp://localhost:26157 --yes
            sleep 2
            ${{ env.DEPLOY_PATH }}/create-val-tx \
              --home "$HOME/.svoted-val2" \
              --moniker val2 \
              --amount 10000000usvote \
              --rpc-url tcp://localhost:26157
            sleep 2
            ${{ env.DEPLOY_PATH }}/create-val-tx \
              --home "$HOME/.svoted-val3" \
              --moniker val3 \
              --amount 10000000usvote \
              --rpc-url tcp://localhost:26157
            echo "Waiting for val3 registration tx to be committed..."
            sleep 6

      - name: Verify services healthy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            dump_val1_diag() {
              echo "--- systemctl status svoted-val1 ---"
              sudo systemctl status svoted-val1 --no-pager || true
              echo "--- listening ports ---"
              sudo ss -tlnp | grep -E ':1418|:1518|:1618|:26157|:3000' || echo "(none matched)"
              since_ts=$(systemctl show -p InactiveExitTimestamp --value svoted-val1.service)
              if [ -n "$since_ts" ]; then
                echo "--- journal since last svoted-val1 start ($since_ts) ---"
                sudo journalctl -u svoted-val1 --no-pager --since "$since_ts"
              else
                sudo journalctl -u svoted-val1 --no-pager -n 500
              fi
            }

            sleep 5
            services_to_check="svoted-val1 svoted-val2 svoted-val3"
            if [ -d "${{ env.DEPLOY_PATH }}/.svoted-archive" ]; then
              services_to_check="$services_to_check svoted-archive"
            fi
            for svc in $services_to_check; do
              if ! sudo systemctl is-active --quiet "$svc"; then
                echo "FAIL: $svc not active"
                sudo systemctl status "$svc" --no-pager
                since_ts=$(systemctl show -p InactiveExitTimestamp --value "$svc.service")
                if [ -n "$since_ts" ]; then
                  sudo journalctl -u "$svc" --no-pager --since "$since_ts"
                else
                  sudo journalctl -u "$svc" --no-pager -n 500
                fi
                exit 1
              fi
            done
            for i in $(seq 1 30); do
              if curl -sf http://127.0.0.1:1418/shielded-vote/v1/rounds > /dev/null 2>&1; then
                echo "Chain API healthy (val1 port 1418)"
                break
              fi
              if [ "$i" = "30" ]; then
                echo "FAIL: Chain API not responding after 60s"
                dump_val1_diag
                exit 1
              fi
              sleep 2
            done
            for i in $(seq 1 15); do
              if curl -sf http://127.0.0.1:1418/shielded-vote/v1/status > /dev/null 2>&1; then
                echo "Helper server healthy"
                break
              fi
              if [ "$i" = "15" ]; then
                echo "FAIL: Helper server /shielded-vote/v1/status not responding after 30s"
                dump_val1_diag
                exit 1
              fi
              sleep 2
            done
            if [ -d "${{ env.DEPLOY_PATH }}/.svoted-archive" ]; then
              for i in $(seq 1 30); do
                if curl -sf http://127.0.0.1:1718/cosmos/base/tendermint/v1beta1/blocks/latest > /dev/null 2>&1; then
                  echo "Archive LCD healthy (port 1718)"
                  break
                fi
                if [ "$i" = "30" ]; then
                  echo "FAIL: Archive LCD not responding on 1718 after 60s"
                  echo "--- systemctl status svoted-archive ---"
                  sudo systemctl status svoted-archive --no-pager
                  since_ts=$(systemctl show -p InactiveExitTimestamp --value svoted-archive.service)
                  if [ -n "$since_ts" ]; then
                    sudo journalctl -u svoted-archive --no-pager --since "$since_ts"
                  else
                    sudo journalctl -u svoted-archive --no-pager -n 500
                  fi
                  exit 1
                fi
                sleep 2
              done
              echo "Chain + helper server + archive all healthy"
            else
              echo "Chain + helper server healthy (archive not initialized — run reset_chain=true)"
            fi
