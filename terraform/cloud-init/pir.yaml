#cloud-config
# Cloud-init for vote-nullifier-pir (${role}): nf-server + Caddy

package_update: true
package_upgrade: true

packages:
  - ca-certificates
  - curl
  - jq
  - debian-keyring
  - debian-archive-keyring
  - apt-transport-https

write_files:
  - path: /etc/systemd/system/nullifier-query-server.service
    permissions: "0644"
    content: |
      ${indent(6, systemd_unit)}

  - path: /etc/caddy/Caddyfile
    permissions: "0644"
    content: |
      ${indent(6, caddyfile)}

  - path: /etc/default/caddy-env
    permissions: "0644"
    content: |
      PIR_HOSTNAME=${hostname}

  - path: /etc/systemd/system/caddy.service.d/override.conf
    permissions: "0644"
    content: |
      [Service]
      EnvironmentFile=/etc/default/caddy-env

  - path: /opt/nf-ingest/bootstrap-and-export.sh
    permissions: "0755"
    owner: root:root
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      cd /opt/nf-ingest
      for f in nullifiers.bin nullifiers.checkpoint nullifiers.tree; do
        curl -fL --retry 5 -o "$f.new" "${snapshot_url}/$f"
        mv "$f.new" "$f"
      done
      ./nf-server export --data-dir . --output-dir ./pir-data
      systemctl restart nullifier-query-server

  - path: /etc/systemd/system/nf-resync.service
    permissions: "0644"
    content: |
      [Unit]
      Description=Re-sync nullifier snapshot and re-export PIR data

      [Service]
      Type=oneshot
      ExecStart=/opt/nf-ingest/bootstrap-and-export.sh

  - path: /etc/systemd/system/nf-resync.timer
    permissions: "0644"
    content: |
      [Unit]
      Description=Periodic nullifier snapshot re-pull

      [Timer]
      OnCalendar=${resync_on_calendar}
      Persistent=true

      [Install]
      WantedBy=timers.target

runcmd:
  # Install Caddy from official apt repo
  - curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/gpg.key' | gpg --dearmor -o /usr/share/keyrings/caddy-stable-archive-keyring.gpg
  - curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/debian.deb.txt' | tee /etc/apt/sources.list.d/caddy-stable.list
  - apt-get update
  - DEBIAN_FRONTEND=noninteractive apt-get install -y -o Dpkg::Options::="--force-confold" caddy

  # Mount block volume for PIR data
  - mkdir -p /mnt/pir-data /opt/nf-ingest
  - |
    dev="/dev/disk/by-id/scsi-0DO_Volume_${volume_name}"
    if [ -b "$dev" ]; then
      mount -o defaults,noatime "$dev" /mnt/pir-data || true
    fi
  - echo '/dev/disk/by-id/scsi-0DO_Volume_${volume_name} /mnt/pir-data ext4 defaults,noatime,nofail 0 2' >> /etc/fstab
  - mount --bind /mnt/pir-data /opt/nf-ingest || true
  - echo '/mnt/pir-data /opt/nf-ingest none bind,nofail 0 0' >> /etc/fstab

  # Download nf-server release binary
  - |
    tag="${release_tag}"
    if [ "$tag" = "latest" ]; then
      tag=$(curl -s https://api.github.com/repos/valargroup/vote-nullifier-pir/releases/latest | jq -r .tag_name)
    fi
    curl -fL --retry 5 -o /opt/nf-ingest/nf-server \
      "https://github.com/valargroup/vote-nullifier-pir/releases/download/$tag/nf-server-linux-amd64"
    chmod +x /opt/nf-ingest/nf-server

  # Bootstrap snapshot and export PIR tier files
  - /opt/nf-ingest/bootstrap-and-export.sh

  # Enable and start services
  - systemctl daemon-reload
  - systemctl enable --now nullifier-query-server
  - systemctl enable --now nf-resync.timer
  - systemctl restart caddy
