# Deploy Caddyfile to the remote host on changes.

name: Deploy Caddyfile

on:
  push:
    branches: [main]
    paths:
      - 'deploy/Caddyfile'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy Caddyfile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          sparse-checkout: deploy/Caddyfile
          sparse-checkout-cone-mode: false
      - name: Deploy via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: "deploy/Caddyfile"
          target: /tmp
          strip_components: 1
      - name: Install and reload Caddy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            sudo cp /tmp/Caddyfile /etc/caddy/Caddyfile
            sudo caddy validate --config /etc/caddy/Caddyfile
            sudo systemctl reload caddy

  notify-slack:
    name: Slack Notification
    if: ${{ always() && contains(join(needs.*.result, ','), 'failure') }}
    needs: [deploy]
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack on failure
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "Caddyfile Deploy failed on main",
              "blocks": [
                {
                  "type": "header",
                  "text": { "type": "plain_text", "text": "Caddyfile Deploy Failed on main", "emoji": true }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Workflow:*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Deploy Caddyfile>" },
                    { "type": "mrkdwn", "text": "*Branch:*\nmain" },
                    { "type": "mrkdwn", "text": "*Commit:*\n<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|`${{ github.sha }}`>" },
                    { "type": "mrkdwn", "text": "*Author:*\n${{ github.actor }}" }
                  ]
                }
              ]
            }
