# Smoke-tests join.sh across all four release platforms.
#
# Runs join.sh with SVOTE_SKIP_SERVICE=1 + SVOTE_SKIP_CADDY=1, which exercises:
#   - Binary download + SHA-256 checksum (arch-specific tarball from DO Spaces)
#   - voting-config CDN discovery + P2P peer resolution
#   - svoted init + genesis fetch + genesis validation
#   - latest chain snapshot download + SHA-256 checksum + restore when published
#   - init-validator-keys (Cosmos account + Pallas + EA keypairs)
#   - config.toml / app.toml patching
#
# Does NOT test: service installation (systemd/launchd) or chain sync.
# Those are covered by the full E2E test (test-e2e job in ci.yml).
#
# Darwin platforms use native macOS GitHub runners (Docker cannot run macOS).
# Linux platforms additionally have a local Docker test in scripts/test-join-docker.sh.
#
# Note: darwin/amd64 is not tested in CI. GitHub's macos-13 (Intel) runners are
# effectively unavailable (phased out). The darwin-amd64 binary is cross-compiled
# from the same macos-latest (arm64) host in release.yml; the script logic
# (sed, launchctl, brew) is identical across Darwin architectures.

name: test-join

on:
  push:
    branches: [main]
    paths:
      - join.sh
      - scripts/svoted-wrapper.sh
      - scripts/test_svoted_wrapper.sh
      - Dockerfile.join-test
      - scripts/test-join-docker.sh
      - .github/workflows/test-join.yml
  pull_request:
    branches: [main]
    paths:
      - join.sh
      - scripts/svoted-wrapper.sh
      - scripts/test_svoted_wrapper.sh
      - Dockerfile.join-test
      - scripts/test-join-docker.sh
      - .github/workflows/test-join.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke-test:
    name: join.sh (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux/amd64
          - os: ubuntu-24.04-arm
            label: linux/arm64
          - os: macos-latest
            label: darwin/arm64
          # darwin/amd64 omitted: macos-13 (Intel) runners are effectively
          # unavailable on GitHub Actions (phased out). The darwin-amd64 binary
          # is cross-compiled from macos-latest (arm64) in release.yml; the
          # script logic is identical across Darwin architectures.

    steps:
      - uses: actions/checkout@v4

      - name: Verify truncated stream is inert
        shell: bash
        run: |
          OUTPUT=$(sed -n '1,500p' join.sh | bash 2>&1) || STATUS=$?
          STATUS=${STATUS:-0}

          if [ "$STATUS" -eq 0 ]; then
            echo "Expected truncated join.sh to fail before execution"
            exit 1
          fi

          if printf '%s\n' "$OUTPUT" | grep -q "Shielded-Vote validator join"; then
            echo "Truncated join.sh executed installer code:"
            printf '%s\n' "$OUTPUT"
            exit 1
          fi

      - name: Install jq and lz4 (macOS)
        if: runner.os == 'macOS'
        run: |
          command -v jq || brew install jq
          command -v lz4 || brew install lz4

      - name: Run join.sh smoke test
        env:
          SVOTE_MONIKER: ci-test
          SVOTE_SKIP_SERVICE: "1"
          SVOTE_SKIP_CADDY: "1"
          SVOTE_ADMIN_URL: http://127.0.0.1:9
        run: bash join.sh

      - name: Run svoted-wrapper unit smoke test
        run: bash scripts/test_svoted_wrapper.sh

      - name: Verify output files and config
        shell: bash
        run: |
          set -euo pipefail
          D="${SVOTE_HOME:-$HOME/.svoted}"
          fail=0

          check_file() {
            if [ -f "$1" ]; then
              echo "  OK  $1"
            else
              echo "  MISSING  $1"
              fail=1
            fi
          }

          echo "=== Checking files in ${D} ==="
          check_file "${D}/config/config.toml"
          check_file "${D}/config/app.toml"
          check_file "${D}/config/genesis.json"
          check_file "${D}/data/priv_validator_state.json"
          check_file "${D}/pallas.sk"
          check_file "${D}/pallas.pk"
          check_file "${D}/ea.sk"
          check_file "${D}/ea.pk"
          if [ -f "${D}/data/application.db/CURRENT" ]; then
            echo "  OK  snapshot/app state present"
          else
            echo "  INFO  no restored app state found; join.sh likely used genesis fallback"
          fi

          echo "=== Checking config.toml contents ==="
          # persistent_peers must have been set (not left empty).
          if grep -qE 'persistent_peers = ".+"' "${D}/config/config.toml"; then
            echo "  OK  persistent_peers set"
          else
            echo "  FAIL  persistent_peers is empty"
            fail=1
          fi

          echo "=== Checking app.toml contents ==="
          # REST API must be enabled.
          if grep -q 'enable = true' "${D}/config/app.toml"; then
            echo "  OK  REST API enabled"
          else
            echo "  FAIL  REST API not enabled"
            fail=1
          fi
          # [helper] section must have been appended.
          if grep -q '\[helper\]' "${D}/config/app.toml"; then
            echo "  OK  [helper] section present"
          else
            echo "  FAIL  [helper] section missing"
            fail=1
          fi

          [ "$fail" -eq 0 ] && echo "=== All checks passed ===" || { echo "=== CHECKS FAILED ==="; exit 1; }
