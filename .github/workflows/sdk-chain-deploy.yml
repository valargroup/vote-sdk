# Deploy a 3-validator svoted chain to a single remote host on every push to
# main, then restart services. Optionally reset chain state.

name: Deploy SDK chain

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      reset_chain:
        description: "Reset chain state (wipes existing data and reinitializes all 3 validators)"
        type: boolean
        default: false

permissions:
  contents: read

env:
  DEPLOY_PATH: /opt/shielded-vote
  VOTE_NULLIFIER_PIR_REF: v0.0.7

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Configure private repo access
        run: git config --global url."https://x-access-token:${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/".insteadOf "ssh://git@github.com/"
      - name: Install mise
        uses: jdx/mise-action@v2
      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            circuits/target
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-circuits-${{ hashFiles('circuits/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-circuits-
      - name: Checkout vote-nullifier-pir
        uses: actions/checkout@v4
        with:
          repository: valargroup/vote-nullifier-pir
          ref: ${{ env.VOTE_NULLIFIER_PIR_REF }}
          path: vote-nullifier-pir
      - name: Cache nf-server build
        uses: actions/cache@v4
        with:
          path: vote-nullifier-pir/target
          key: ${{ runner.os }}-nfserver-${{ env.VOTE_NULLIFIER_PIR_REF }}
      - name: Build embedded nf-server
        run: make pir-binary
        env:
          VOTE_NULLIFIER_PIR_DIR: vote-nullifier-pir
      - name: Build SDK binaries
        run: mise run build && mise run build:create-val-tx
        env:
          BUILD_TAGS: halo2 redpallas embed_pir
          EMBED_PIR: "1"
      - name: Build admin UI
        run: cd ui && npm install && npm run build
      - name: Copy init scripts to build root
        run: |
          cp scripts/init_multi.sh init_multi.sh
          cp scripts/init-archive.sh init-archive.sh
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sdk-chain-binaries
          path: |
            svoted
            create-val-tx
            init_multi.sh
            init-archive.sh
            ui/dist
            docs/svoted-val1.service
            docs/svoted-val2.service
            docs/svoted-val3.service
            docs/svoted-archive.service

  build-explorer:
    name: Build explorer
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          sparse-checkout: deploy/explorer
          sparse-checkout-cone-mode: false
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Enable corepack (yarn 1.x)
        run: corepack enable
      - name: Cache yarn packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/yarn
          key: yarn-pingpub-ee1ca5ee54d7bd2dc4c5b4df8f3b93595440e9c8
      - name: Clone ping-pub and build
        run: |
          git clone https://github.com/ping-pub/explorer.git /tmp/ping-pub
          cd /tmp/ping-pub
          git checkout ee1ca5ee54d7bd2dc4c5b4df8f3b93595440e9c8
          # Drop all upstream chain configs so the UI shows only our chain.
          rm -f chains/mainnet/*.json chains/testnet/*.json
          # ping-pub defaults to "mainnet" when the hostname doesn't contain
          # "testnet" — our svote config goes in mainnet/ to be discoverable.
          cp "$GITHUB_WORKSPACE/deploy/explorer/svote.json" chains/mainnet/svote.json
          # Bundle the zcash logo so the chain icon resolves to an asset we control.
          cp "$GITHUB_WORKSPACE/deploy/explorer/zcash.svg" public/logos/zcash.svg
          yarn install
          yarn build
          tar czf "$GITHUB_WORKSPACE/explorer-dist.tar.gz" -C dist .
      - name: Upload explorer artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdk-explorer-dist
          path: explorer-dist.tar.gz

  deploy:
    name: Deploy binaries
    runs-on: ubuntu-latest
    needs: [build, build-explorer]
    steps:
      - name: Download chain artifacts
        uses: actions/download-artifact@v4
        with:
          name: sdk-chain-binaries
      - name: Download explorer artifact
        uses: actions/download-artifact@v4
        with:
          name: sdk-explorer-dist
      - name: Make binaries executable
        run: chmod +x svoted create-val-tx
      - name: Create deploy directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: mkdir -p ${{ env.DEPLOY_PATH }}
      - name: Deploy via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: "svoted,create-val-tx,init_multi.sh,init-archive.sh,ui/dist,explorer-dist.tar.gz,docs/svoted-val1.service,docs/svoted-val2.service,docs/svoted-val3.service,docs/svoted-archive.service"
          target: ${{ env.DEPLOY_PATH }}
      - name: Install explorer bundle on host
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            sudo mkdir -p /opt/shielded-vote/explorer/dist
            sudo rm -rf /opt/shielded-vote/explorer/dist/*
            sudo tar xzf /opt/shielded-vote/explorer-dist.tar.gz -C /opt/shielded-vote/explorer/dist
            sudo rm -f /opt/shielded-vote/explorer-dist.tar.gz

  restart:
    name: Restart chain
    needs: deploy
    uses: ./.github/workflows/sdk-chain-reset.yml
    with:
      reset_chain: ${{ inputs.reset_chain == true }}
    secrets: inherit

  notify-slack:
    name: Slack Notification
    if: ${{ always() && github.ref == 'refs/heads/main' && contains(join(needs.*.result, ','), 'failure') }}
    needs: [build, build-explorer, deploy, restart]
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack on failure
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "SDK Chain Deploy failed on main",
              "blocks": [
                {
                  "type": "header",
                  "text": { "type": "plain_text", "text": "SDK Chain Deploy Failed on main", "emoji": true }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Workflow:*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Deploy SDK chain>" },
                    { "type": "mrkdwn", "text": "*Branch:*\nmain" },
                    { "type": "mrkdwn", "text": "*Commit:*\n<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|`${{ github.sha }}`>" },
                    { "type": "mrkdwn", "text": "*Author:*\n${{ github.actor }}" }
                  ]
                },
                {
                  "type": "section",
                  "text": { "type": "mrkdwn", "text": "*Job Results:*\nBuild: `${{ needs.build.result }}` | Build-Explorer: `${{ needs.build-explorer.result }}` | Deploy: `${{ needs.deploy.result }}` | Restart: `${{ needs.restart.result }}`" }
                }
              ]
            }
