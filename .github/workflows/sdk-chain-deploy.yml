# Deploy a tagged shielded-vote release to both production hosts.
# Runs automatically after a successful release, or manually via workflow_dispatch.

name: Deploy SDK

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to deploy (e.g. v1.2.3). Must already exist in DO Spaces."
        type: string
        required: true
      include_snapshot:
        description: "Deploy the dedicated snapshot node. Enable only after vote-snapshot is provisioned and SNAPSHOT_HOST exists."
        type: boolean
        default: false
  workflow_call:
    inputs:
      tag:
        description: "Release tag to deploy (e.g. v1.2.3). Must already exist in DO Spaces."
        type: string
        required: true
      include_snapshot:
        description: "Deploy the dedicated snapshot node. Enable only after vote-snapshot is provisioned and SNAPSHOT_HOST exists."
        type: boolean
        default: false

permissions:
  contents: read

env:
  TAG: ${{ inputs.tag }}
  RELEASE_BASE_URL: https://vote.fra1.digitaloceanspaces.com/binaries/vote-sdk

jobs:
  deploy-primary:
    name: Deploy primary
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to primary Droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PRIMARY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: SENTRY_DSN
          script: |
            sed -i '/^SENTRY_DSN=/d' /etc/default/svoted
            echo "SENTRY_DSN=$SENTRY_DSN" >> /etc/default/svoted
            /opt/shielded-vote/install-release.sh --tag "${{ env.TAG }}" --base "${{ env.RELEASE_BASE_URL }}"
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

      - name: Verify primary health
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PRIMARY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            for i in $(seq 1 30); do
              if curl -sf http://localhost:1317/shielded-vote/v1/rounds > /dev/null 2>&1; then
                echo "Primary REST API healthy."
                exit 0
              fi
              echo "Waiting for primary REST API... ($i/30)"
              sleep 10
            done
            echo "ERROR: Primary REST API not healthy after 5 minutes."
            exit 1

  deploy-secondary:
    name: Deploy secondary
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to secondary Droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SECONDARY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: SENTRY_DSN
          script: |
            sed -i '/^SENTRY_DSN=/d' /etc/default/svoted
            echo "SENTRY_DSN=$SENTRY_DSN" >> /etc/default/svoted
            /opt/shielded-vote/install-release.sh --tag "${{ env.TAG }}" --base "${{ env.RELEASE_BASE_URL }}"
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

      - name: Verify secondary health
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SECONDARY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            for i in $(seq 1 30); do
              if curl -sf http://localhost:1317/shielded-vote/v1/rounds > /dev/null 2>&1; then
                echo "Secondary REST API healthy."
                exit 0
              fi
              echo "Waiting for secondary REST API... ($i/30)"
              sleep 10
            done
            echo "ERROR: Secondary REST API not healthy after 5 minutes."
            exit 1

  deploy-explorer:
    name: Deploy explorer
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to explorer Droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EXPLORER_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: SENTRY_DSN,TAG
          script: |
            set -euo pipefail
            sed -i '/^SENTRY_DSN=/d' /etc/default/svoted
            echo "SENTRY_DSN=$SENTRY_DSN" >> /etc/default/svoted

            # On first deploy (before sdk-chain-reset.yml runs reset-archive),
            # .svoted/config/genesis.json doesn't exist yet — svoted can't
            # start, so skip the restart. Subsequent deploys restart normally
            # to pick up the new binary.
            if [ -f /opt/shielded-vote/.svoted/config/genesis.json ]; then
              /opt/shielded-vote/install-release.sh --tag "${TAG}"
            else
              /opt/shielded-vote/install-release.sh --tag "${TAG}" --skip-restart
              echo "NOTE: archive has no genesis yet. Run sdk-chain-reset.yml with this tag to initialize it."
            fi
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

      - name: Verify explorer frontend healthy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EXPLORER_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Caddy serves the static explorer dist regardless of archive
            # state, so this check only verifies the frontend is reachable.
            # Archive health is verified in sdk-chain-reset.yml.
            for i in $(seq 1 15); do
              if curl -sf http://localhost/ > /dev/null 2>&1; then
                echo "Explorer frontend healthy."
                exit 0
              fi
              echo "Waiting for explorer frontend... ($i/15)"
              sleep 10
            done
            echo "ERROR: Explorer frontend not healthy after 2.5 minutes."
            exit 1

  deploy-snapshot:
    name: Deploy snapshot node
    if: ${{ inputs.include_snapshot }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to snapshot Droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SNAPSHOT_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: SENTRY_DSN,TAG
          script: |
            set -euo pipefail
            sed -i '/^SENTRY_DSN=/d' /etc/default/svoted
            echo "SENTRY_DSN=$SENTRY_DSN" >> /etc/default/svoted

            # On first deploy (before sdk-chain-reset.yml runs reset-snapshot),
            # .svoted/config/genesis.json does not exist yet, so svoted cannot
            # start. Subsequent deploys restart normally to pick up the binary.
            if [ -f /opt/shielded-vote/.svoted/config/genesis.json ]; then
              /opt/shielded-vote/install-release.sh --tag "${TAG}"
            else
              /opt/shielded-vote/install-release.sh --tag "${TAG}" --skip-restart
              echo "NOTE: snapshot node has no genesis yet. Run sdk-chain-reset.yml with this tag to initialize it."
            fi
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

      - name: Verify snapshot frontend healthy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SNAPSHOT_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            for i in $(seq 1 15); do
              if curl -sf -H "Host: snapshots.${{ secrets.DOMAIN }}" http://localhost/ > /dev/null 2>&1; then
                echo "Snapshot frontend healthy."
                exit 0
              fi
              echo "Waiting for snapshot frontend... ($i/15)"
              sleep 10
            done
            echo "ERROR: Snapshot frontend not healthy after 2.5 minutes."
            exit 1

  notify-slack:
    name: Slack Notification
    if: ${{ always() && contains(join(needs.*.result, ','), 'failure') }}
    needs: [deploy-primary, deploy-secondary, deploy-explorer, deploy-snapshot]
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack on failure
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "SDK Deploy failed",
              "blocks": [
                {
                  "type": "header",
                  "text": { "type": "plain_text", "text": "SDK Deploy Failed", "emoji": true }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Workflow:*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Deploy SDK>" },
                    { "type": "mrkdwn", "text": "*Tag:*\n`${{ env.TAG }}`" }
                  ]
                },
                {
                  "type": "section",
                  "text": { "type": "mrkdwn", "text": "*Job Results:*\nPrimary: `${{ needs.deploy-primary.result }}` | Secondary: `${{ needs.deploy-secondary.result }}` | Explorer: `${{ needs.deploy-explorer.result }}` | Snapshot: `${{ needs.deploy-snapshot.result }}`" }
                }
              ]
            }
