# Deploy a tagged shielded-vote release to both production hosts.
# Triggered automatically after a release build, or manually via workflow_dispatch.

name: Deploy SDK

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to deploy (e.g. v1.2.3). Must already exist in DO Spaces."
        type: string
        required: true
  workflow_call:
    inputs:
      tag:
        required: true
        type: string

permissions:
  contents: read

env:
  TAG: ${{ inputs.tag }}

jobs:
  deploy-primary:
    name: Deploy primary
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to primary Droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PRIMARY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            /opt/shielded-vote/install-release.sh --tag "${{ env.TAG }}"

      - name: Verify primary health
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PRIMARY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            for i in $(seq 1 30); do
              if curl -sf http://localhost:1317/shielded-vote/v1/rounds > /dev/null 2>&1; then
                echo "Primary REST API healthy."
                exit 0
              fi
              echo "Waiting for primary REST API... ($i/30)"
              sleep 10
            done
            echo "ERROR: Primary REST API not healthy after 5 minutes."
            exit 1

  deploy-secondary:
    name: Deploy secondary
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to secondary Droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SECONDARY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            /opt/shielded-vote/install-release.sh --tag "${{ env.TAG }}"

      - name: Verify secondary health
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SECONDARY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            for i in $(seq 1 30); do
              if curl -sf http://localhost:1317/shielded-vote/v1/rounds > /dev/null 2>&1; then
                echo "Secondary REST API healthy."
                exit 0
              fi
              echo "Waiting for secondary REST API... ($i/30)"
              sleep 10
            done
            echo "ERROR: Secondary REST API not healthy after 5 minutes."
            exit 1

  notify-slack:
    name: Slack Notification
    if: ${{ always() && contains(join(needs.*.result, ','), 'failure') }}
    needs: [deploy-primary, deploy-secondary]
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack on failure
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "SDK Deploy failed",
              "blocks": [
                {
                  "type": "header",
                  "text": { "type": "plain_text", "text": "SDK Deploy Failed", "emoji": true }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Workflow:*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Deploy SDK>" },
                    { "type": "mrkdwn", "text": "*Tag:*\n`${{ env.TAG }}`" }
                  ]
                },
                {
                  "type": "section",
                  "text": { "type": "mrkdwn", "text": "*Job Results:*\nPrimary: `${{ needs.deploy-primary.result }}` | Secondary: `${{ needs.deploy-secondary.result }}`" }
                }
              ]
            }
