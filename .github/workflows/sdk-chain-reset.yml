# Reset the deployed 3-validator chain: stop, reinitialize, start, register.
# When reset_chain is false, just restarts services without wiping state.

name: Reset SDK chain

on:
  workflow_dispatch:
    inputs:
      reset_chain:
        description: "Wipe and reinitialize all validator data before starting"
        type: boolean
        default: true
  workflow_call:
    inputs:
      reset_chain:
        type: boolean
        default: false

permissions:
  contents: read

env:
  DEPLOY_PATH: /opt/shielded-vote

jobs:
  reset:
    name: Reset chain
    runs-on: ubuntu-latest
    steps:
      - name: Stop services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            for svc in svoted-val1 svoted-val2 svoted-val3; do
              sudo systemctl stop "$svc" || true
            done
            sudo pkill -9 -x svoted || true
            for i in $(seq 1 20); do
              if ! ss -tlnp | grep -qE ':26156|:26256|:26356|:6160|:6260|:6360'; then
                echo "Ports freed"
                break
              fi
              if [ "$i" = "20" ]; then
                echo "WARN: ports still bound after 20s, forcing..."
                sudo fuser -k 26156/tcp 26256/tcp 26356/tcp 6160/tcp 6260/tcp 6360/tcp || true
                sleep 1
              fi
              sleep 1
            done

      - name: Install updated systemd units
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            for i in 1 2 3; do
              src="${{ env.DEPLOY_PATH }}/docs/svoted-val${i}.service"
              if [ -f "$src" ]; then
                sudo cp "$src" /etc/systemd/system/svoted-val${i}.service
              fi
            done
            sudo systemctl daemon-reload

      - name: Reinitialize all validators
        if: ${{ inputs.reset_chain == true }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          envs: VM_PRIVKEY,SVOTE_HELPER_SENTRY_DSN
          script: |
            export HOME=${{ env.DEPLOY_PATH }} PATH=${{ env.DEPLOY_PATH }}:$PATH
            export VM_PRIVKEY="$VM_PRIVKEY"
            export SVOTE_HELPER_SENTRY_DSN="$SVOTE_HELPER_SENTRY_DSN"
            chmod +x ${{ env.DEPLOY_PATH }}/svoted ${{ env.DEPLOY_PATH }}/create-val-tx
            bash ${{ env.DEPLOY_PATH }}/init_multi.sh --ci
        env:
          VM_PRIVKEY: ${{ secrets.VM_PRIVKEY }}
          SVOTE_HELPER_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

      - name: Reset Edge Config (clear stale validator state)
        if: ${{ inputs.reset_chain == true }}
        env:
          VERCEL_API_TOKEN: ${{ secrets.VERCEL_API_TOKEN }}
          EDGE_CONFIG_ID: ${{ secrets.EDGE_CONFIG_ID }}
        run: |
          # Chain reset generates fresh validator keys, so all previous
          # entries in Edge Config are stale. Clear them so the helpers
          # register into a clean slate.
          curl -sf -X PATCH \
            "https://api.vercel.com/v1/edge-config/${EDGE_CONFIG_ID}/items" \
            -H "Authorization: Bearer ${VERCEL_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{
              "items": [
                {"operation": "upsert", "key": "voting-config", "value": {"version": 1, "vote_servers": [], "pir_servers": [{"url": "https://46-101-255-48.sslip.io/nullifier", "label": "Primary"}]}},
                {"operation": "upsert", "key": "approved-servers", "value": []},
                {"operation": "upsert", "key": "pending-registrations", "value": []},
                {"operation": "upsert", "key": "server-pulses", "value": {}}
              ]
            }'
          echo "Edge Config reset"

      - name: Start services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            for svc in svoted-val1 svoted-val2 svoted-val3; do
              sudo systemctl start "$svc"
            done

      - name: Register post-genesis validators
        if: ${{ inputs.reset_chain == true }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            export HOME=${{ env.DEPLOY_PATH }} PATH=${{ env.DEPLOY_PATH }}:$PATH
            for i in $(seq 1 30); do
              if curl -sf http://localhost:1418/shielded-vote/v1/rounds > /dev/null 2>&1; then
                echo "Val1 API ready"
                break
              fi
              if [ "$i" = "30" ]; then
                echo "FAIL: val1 API not responding after 60s"
                sudo journalctl -u svoted-val1 --no-pager -n 50
                exit 1
              fi
              sleep 2
            done
            ${{ env.DEPLOY_PATH }}/svoted tx vote register-pallas-key \
              --from validator --keyring-backend test \
              --home "$HOME/.svoted-val1" \
              --chain-id svote-1 --node tcp://localhost:26157 --yes
            sleep 2
            ${{ env.DEPLOY_PATH }}/create-val-tx \
              --home "$HOME/.svoted-val2" \
              --moniker val2 \
              --amount 10000000usvote \
              --rpc-url tcp://localhost:26157
            sleep 2
            ${{ env.DEPLOY_PATH }}/create-val-tx \
              --home "$HOME/.svoted-val3" \
              --moniker val3 \
              --amount 10000000usvote \
              --rpc-url tcp://localhost:26157
            echo "Waiting for val3 registration tx to be committed..."
            sleep 6

      - name: Restart services to re-register with Edge Config
        if: ${{ inputs.reset_chain == true }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            # Helpers tried to register on first start but validators weren't
            # bonded yet. Now that create-val-tx has run, restart so the
            # helpers re-run tryRegister against bonded validators.
            # Stagger restarts so each helper's Edge Config write completes
            # before the next one starts (avoids read-modify-write races).
            for svc in svoted-val1 svoted-val2 svoted-val3; do
              sudo systemctl restart "$svc"
              sleep 5
            done

      - name: Verify services healthy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            sleep 5
            for svc in svoted-val1 svoted-val2 svoted-val3; do
              if ! sudo systemctl is-active --quiet "$svc"; then
                echo "FAIL: $svc not active"
                sudo systemctl status "$svc" --no-pager
                sudo journalctl -u "$svc" --no-pager -n 100
                exit 1
              fi
            done
            for i in $(seq 1 30); do
              if curl -sf http://localhost:1418/shielded-vote/v1/rounds > /dev/null 2>&1; then
                echo "Chain API healthy (val1 port 1418)"
                break
              fi
              if [ "$i" = "30" ]; then
                echo "FAIL: Chain API not responding after 60s"
                sudo journalctl -u svoted-val1 --no-pager -n 50
                exit 1
              fi
              sleep 2
            done
            for i in $(seq 1 15); do
              if curl -sf http://localhost:1418/shielded-vote/v1/status > /dev/null 2>&1; then
                echo "Helper server healthy"
                break
              fi
              if [ "$i" = "15" ]; then
                echo "FAIL: Helper server /shielded-vote/v1/status not responding after 30s"
                sudo journalctl -u svoted-val1 --no-pager -n 50
                exit 1
              fi
              sleep 2
            done
            echo "Chain + helper server both healthy"
