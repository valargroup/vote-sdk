# Reset both validators from genesis: wipe state, re-init primary with
# deterministic keys, upload genesis to DO Spaces, fund the secondary
# from the vote-manager, then join secondary.
# Manual-only: triggered via workflow_dispatch with a release tag.

name: Reset SDK Chain

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to deploy (e.g. v1.2.3). Must already exist in DO Spaces."
        type: string
        required: true

permissions:
  contents: read

env:
  TAG: ${{ inputs.tag }}
  DO_SPACES_BASE: https://vote.fra1.digitaloceanspaces.com

jobs:
  reset-primary:
    name: Reset primary (bootstrap)
    runs-on: ubuntu-latest
    steps:
      - name: Install tag and reset primary
        uses: appleboy/ssh-action@v1.0.3
        timeout-minutes: 15
        with:
          host: ${{ secrets.PRIMARY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: TAG,SENTRY_DSN
          script: |
            set -euo pipefail
            export PATH="/opt/shielded-vote/current/bin:$PATH"

            # Install the release
            /opt/shielded-vote/install-release.sh --tag "${TAG}" --skip-restart

            # Stop svoted
            systemctl stop svoted || true

            # Wipe chain state (preserve the releases dir)
            rm -rf /opt/shielded-vote/.svoted/*

            # Write Sentry DSN into the systemd EnvironmentFile
            sed -i '/^SENTRY_DSN=/d' /etc/default/svoted
            echo "SENTRY_DSN=$SENTRY_DSN" >> /etc/default/svoted

            # Run init.sh with deterministic validator key
            export SVOTED_HOME=/opt/shielded-vote/.svoted
            export VM_PRIVKEY="${{ secrets.VM_PRIVKEY }}"
            export VAL_PRIVKEY="${{ secrets.PRIMARY_VAL_PRIVKEY }}"
            export SVOTE_ADMIN_DISABLE=false
            curl -fsSL "https://raw.githubusercontent.com/${{ github.repository }}/${{ github.sha }}/scripts/init.sh" -o /tmp/init.sh
            bash /tmp/init.sh

            # init.sh sets REST API to port 1318 (local dev); fix to 1317 for production
            APP_TOML="/opt/shielded-vote/.svoted/config/app.toml"
            sed -i 's|address = "tcp://0.0.0.0:1318"|address = "tcp://0.0.0.0:1317"|' "$APP_TOML"
            sed -i 's|chain_api_port = 1318|chain_api_port = 1317|' "$APP_TOML"

            # Ensure the primary systemd drop-in exists (serves admin UI)
            mkdir -p /etc/systemd/system/svoted.service.d
            printf '[Service]\nExecStart=\nExecStart=/opt/shielded-vote/current/bin/svoted start --home /opt/shielded-vote/.svoted --serve-ui --ui-dist /opt/shielded-vote/current/ui/dist\n' \
              > /etc/systemd/system/svoted.service.d/primary.conf

            # Start svoted
            systemctl daemon-reload
            systemctl start svoted

            # Wait for REST API
            for i in $(seq 1 30); do
              if curl -sf http://localhost:1317/shielded-vote/v1/rounds > /dev/null 2>&1; then
                echo "Primary REST API healthy."
                exit 0
              fi
              echo "Waiting for primary REST API... ($i/30)"
              sleep 10
            done
            echo "ERROR: Primary REST API not healthy after 5 minutes."
            exit 1
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

  upload-genesis:
    name: Upload genesis to DO Spaces
    runs-on: ubuntu-latest
    needs: reset-primary
    steps:
      - name: Fetch genesis and upload to DO Spaces
        uses: appleboy/ssh-action@v1.0.3
        timeout-minutes: 5
        with:
          host: ${{ secrets.PRIMARY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DO_ACCESS_KEY,DO_SECRET_KEY
          script: |
            set -euo pipefail

            # Fetch genesis from local REST API
            curl -fsSL http://localhost:1317/shielded-vote/v1/genesis > /tmp/genesis.json
            echo "Genesis fetched ($(wc -c < /tmp/genesis.json) bytes)."

            # Install s3cmd if not present
            which s3cmd > /dev/null 2>&1 || apt-get install -y -qq s3cmd

            # Upload directly to DO Spaces
            cat > /tmp/do-spaces.s3cfg <<EOCFG
            [default]
            access_key = ${DO_ACCESS_KEY}
            secret_key = ${DO_SECRET_KEY}
            host_base = fra1.digitaloceanspaces.com
            host_bucket = %(bucket)s.fra1.digitaloceanspaces.com
            bucket_location = fra1
            use_https = True
            EOCFG
            s3cmd -c /tmp/do-spaces.s3cfg put /tmp/genesis.json s3://vote/genesis.json --acl-public --force
            rm -f /tmp/do-spaces.s3cfg
            echo "Genesis uploaded to s3://vote/genesis.json"
        env:
          DO_ACCESS_KEY: ${{ secrets.DO_ACCESS_KEY }}
          DO_SECRET_KEY: ${{ secrets.DO_SECRET_KEY }}

  fund-secondary:
    name: Fund secondary validator
    runs-on: ubuntu-latest
    needs: upload-genesis
    steps:
      - name: Send tokens from vote-manager to secondary address
        uses: appleboy/ssh-action@v1.0.3
        timeout-minutes: 5
        with:
          host: ${{ secrets.PRIMARY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            export PATH="/opt/shielded-vote/current/bin:$PATH"
            HOME_DIR=/opt/shielded-vote/.svoted

            # Derive the secondary address from its private key without importing
            # it into the primary's keyring: import into a temp keyring, read
            # address, delete.
            TMPKR=$(mktemp -d)
            svoted keys import-hex secondary-tmp "${{ secrets.SECONDARY_VAL_PRIVKEY }}" \
              --keyring-backend test --home "$TMPKR"
            SECONDARY_ADDR=$(svoted keys show secondary-tmp -a --keyring-backend test --home "$TMPKR")
            rm -rf "$TMPKR"

            echo "Funding secondary address: ${SECONDARY_ADDR}"

            svoted tx vote authorized-send "${SECONDARY_ADDR}" 100000000 usvote \
              --from manager \
              --keyring-backend test \
              --home "$HOME_DIR" \
              --chain-id svote-1 \
              --yes

            echo "Waiting for tx to be included..."
            sleep 6

            BALANCE=$(svoted query bank balances "${SECONDARY_ADDR}" --home "$HOME_DIR" --output json \
              | jq -r '.balances[] | select(.denom == "usvote") | .amount')
            echo "Secondary balance: ${BALANCE} usvote"

  reset-secondary:
    name: Reset secondary (join)
    runs-on: ubuntu-latest
    needs: fund-secondary
    steps:
      - name: Install tag and join
        uses: appleboy/ssh-action@v1.0.3
        timeout-minutes: 30
        with:
          host: ${{ secrets.SECONDARY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: TAG
          script: |
            set -euo pipefail
            export PATH="/opt/shielded-vote/current/bin:$PATH"

            # Install the release
            /opt/shielded-vote/install-release.sh --tag "${TAG}" --skip-restart

            # Run reset-join with deterministic validator key
            export GENESIS_URL="${{ env.DO_SPACES_BASE }}/genesis.json"
            export PRIMARY_REST_URL="https://vote-chain-primary.${{ secrets.DOMAIN }}"
            export VAL_PRIVKEY="${{ secrets.SECONDARY_VAL_PRIVKEY }}"
            export HOME_DIR=/opt/shielded-vote/.svoted
            export CHAIN_ID=svote-1
            export MONIKER=secondary

            curl -fsSL "https://raw.githubusercontent.com/${{ github.repository }}/${{ github.sha }}/scripts/reset-join.sh" -o /tmp/reset-join.sh
            bash /tmp/reset-join.sh

      - name: Verify secondary health
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SECONDARY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            for i in $(seq 1 20); do
              if curl -sf http://localhost:1317/shielded-vote/v1/rounds > /dev/null 2>&1; then
                echo "Secondary REST API healthy."
                exit 0
              fi
              echo "Waiting for secondary REST API... ($i/20)"
              sleep 15
            done
            echo "ERROR: Secondary REST API not healthy."
            exit 1

  verify:
    name: Post-reset verification
    runs-on: ubuntu-latest
    needs: reset-secondary
    steps:
      - name: Check both validators
        run: |
          FAILED=0
          for HOST in "vote-chain-primary" "vote-chain-secondary"; do
            URL="https://${HOST}.${{ secrets.DOMAIN }}/shielded-vote/v1/rounds"
            for i in $(seq 1 10); do
              STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "$URL" || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "[OK] ${HOST} healthy"
                break
              fi
              if [ "$i" -eq 10 ]; then
                echo "[FAIL] ${HOST} not healthy (HTTP ${STATUS})"
                FAILED=1
              fi
              sleep 10
            done
          done
          exit $FAILED

  notify-slack:
    name: Slack Notification
    if: ${{ always() && contains(join(needs.*.result, ','), 'failure') }}
    needs: [reset-primary, upload-genesis, fund-secondary, reset-secondary, verify]
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack on failure
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "SDK Chain Reset failed",
              "blocks": [
                {
                  "type": "header",
                  "text": { "type": "plain_text", "text": "SDK Chain Reset Failed", "emoji": true }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Workflow:*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Reset SDK Chain>" },
                    { "type": "mrkdwn", "text": "*Tag:*\n`${{ env.TAG }}`" }
                  ]
                },
                {
                  "type": "section",
                  "text": { "type": "mrkdwn", "text": "*Job Results:*\nReset Primary: `${{ needs.reset-primary.result }}` | Upload Genesis: `${{ needs.upload-genesis.result }}` | Fund Secondary: `${{ needs.fund-secondary.result }}` | Reset Secondary: `${{ needs.reset-secondary.result }}` | Verify: `${{ needs.verify.result }}`" }
                }
              ]
            }
