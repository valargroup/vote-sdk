#cloud-config
# Cloud-init for vote-primary: bootstrap validator + Caddy

package_update: true
package_upgrade: true

packages:
  - ca-certificates
  - curl
  - jq
  - debian-keyring
  - debian-archive-keyring
  - apt-transport-https

write_files:
  - path: /etc/default/svoted
    permissions: "0600"
    owner: root:root
    content: |
      SVOTE_CHAIN_ID=${chain_id}
      SVOTE_DOMAIN=${domain}

  - path: /etc/systemd/system/svoted.service
    permissions: "0644"
    content: |
      ${indent(6, systemd_unit)}

  - path: /etc/caddy/Caddyfile
    permissions: "0644"
    content: |
      ${indent(6, caddyfile)}

  - path: /etc/default/caddy-env
    permissions: "0644"
    content: |
      DOMAIN=${domain}

  - path: /etc/systemd/system/caddy.service.d/override.conf
    permissions: "0644"
    content: |
      [Service]
      EnvironmentFile=/etc/default/caddy-env

  - path: /opt/shielded-vote/install-release.sh
    permissions: "0755"
    owner: root:root
    content: |
      ${indent(6, install_script)}

runcmd:
  # Install Caddy from official apt repo
  - curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/gpg.key' | gpg --dearmor -o /usr/share/keyrings/caddy-stable-archive-keyring.gpg
  - curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/debian.deb.txt' | tee /etc/apt/sources.list.d/caddy-stable.list
  - apt-get update
  - DEBIAN_FRONTEND=noninteractive apt-get install -y -o Dpkg::Options::="--force-confold" caddy

  # Mount block volume for chain data
  - mkdir -p /mnt/chain-data /opt/shielded-vote/.svoted
  - |
    dev="/dev/disk/by-id/scsi-0DO_Volume_${volume_name}"
    if [ -b "$dev" ]; then
      mount -o defaults,noatime "$dev" /mnt/chain-data || true
    fi
  - echo '/dev/disk/by-id/scsi-0DO_Volume_${volume_name} /mnt/chain-data ext4 defaults,noatime,nofail 0 2' >> /etc/fstab
  - mount --bind /mnt/chain-data /opt/shielded-vote/.svoted || true
  - echo '/mnt/chain-data /opt/shielded-vote/.svoted none bind,nofail 0 0' >> /etc/fstab

  # Install the release binary (skip restart - service not yet enabled)
  - SKIP_RESTART=1 /opt/shielded-vote/install-release.sh --tag "${release_tag}"

  # Enable and start services
  - systemctl daemon-reload
  - systemctl enable --now svoted
  - systemctl restart caddy
