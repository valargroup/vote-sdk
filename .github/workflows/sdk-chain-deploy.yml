# Deploy a 3-validator svoted chain to a single remote host on every push to
# main, then restart services. Optionally reset chain state.

name: Deploy SDK chain

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      reset_chain:
        description: "Reset chain state (wipes existing data and reinitializes all 3 validators)"
        type: boolean
        default: false

permissions:
  contents: read

env:
  DEPLOY_PATH: /opt/shielded-vote

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure private repo access
        run: git config --global url."https://x-access-token:${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/".insteadOf "ssh://git@github.com/"
      - name: Install mise
        uses: jdx/mise-action@v2
      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            circuits/target
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-circuits-${{ hashFiles('circuits/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-circuits-
      - name: Build SDK binaries
        run: mise run build && mise run build:create-val-tx
      - name: Copy init script to build root
        run: cp scripts/init_multi.sh init_multi.sh
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sdk-chain-binaries
          path: |
            svoted
            create-val-tx
            init_multi.sh

  deploy:
    name: Deploy binaries
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: sdk-chain-binaries
      - name: Make binaries executable
        run: chmod +x svoted create-val-tx
      - name: Create deploy directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: mkdir -p ${{ env.DEPLOY_PATH }}
      - name: Deploy via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: "svoted,create-val-tx,init_multi.sh"
          target: ${{ env.DEPLOY_PATH }}

  restart:
    name: Restart chain
    needs: deploy
    uses: ./.github/workflows/sdk-chain-reset.yml
    with:
      reset_chain: ${{ inputs.reset_chain == true }}
    secrets: inherit

  notify-slack:
    name: Slack Notification
    if: ${{ always() && github.ref == 'refs/heads/main' && contains(join(needs.*.result, ','), 'failure') }}
    needs: [build, deploy, restart]
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack on failure
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "SDK Chain Deploy failed on main",
              "blocks": [
                {
                  "type": "header",
                  "text": { "type": "plain_text", "text": "SDK Chain Deploy Failed on main", "emoji": true }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Workflow:*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Deploy SDK chain>" },
                    { "type": "mrkdwn", "text": "*Branch:*\nmain" },
                    { "type": "mrkdwn", "text": "*Commit:*\n<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|`${{ github.sha }}`>" },
                    { "type": "mrkdwn", "text": "*Author:*\n${{ github.actor }}" }
                  ]
                },
                {
                  "type": "section",
                  "text": { "type": "mrkdwn", "text": "*Job Results:*\nBuild: `${{ needs.build.result }}` | Deploy: `${{ needs.deploy.result }}` | Restart: `${{ needs.restart.result }}`" }
                }
              ]
            }
