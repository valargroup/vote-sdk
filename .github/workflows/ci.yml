name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install mise
        uses: jdx/mise-action@v2
      - name: Cache Go build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-lint-go-${{ hashFiles('go.sum') }}
          restore-keys: |
            ${{ runner.os }}-lint-go-
      - name: Run go vet
        run: mise run lint

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Configure private repo access
        run: git config --global url."https://x-access-token:${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/".insteadOf "ssh://git@github.com/"
      - name: Install mise
        uses: jdx/mise-action@v2
      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: circuits/target
          key: ${{ runner.os }}-circuits-${{ hashFiles('circuits/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-circuits-
      - name: Build circuits
        run: mise run build:circuits
      - name: Run unit tests
        run: mise run test:unit

  test-helper:
    name: Helper Server Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install mise
        uses: jdx/mise-action@v2
      - name: Run helper tests
        run: mise run test:helper

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Configure private repo access
        run: git config --global url."https://x-access-token:${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/".insteadOf "ssh://git@github.com/"
      - name: Install mise
        uses: jdx/mise-action@v2
      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: circuits/target
          key: ${{ runner.os }}-circuits-${{ hashFiles('circuits/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-circuits-
      - name: Build circuits
        run: mise run build:circuits
      - name: Run integration tests
        run: mise run test:integration

  test-halo2:
    name: Halo2 ZKP Verification Tests
    runs-on: ubuntu-latest
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Configure private repo access
        run: git config --global url."https://x-access-token:${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/".insteadOf "ssh://git@github.com/"
      - name: Install mise
        uses: jdx/mise-action@v2
      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: circuits/target
          key: ${{ runner.os }}-circuits-${{ hashFiles('circuits/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-circuits-
      - name: Build circuits
        run: mise run build:circuits
      - name: Run Rust circuit tests
        run: mise run test:circuits
      - name: Run Go Halo2 verification tests
        run: mise run test:halo2

  test-vc-van-deterministic:
    name: VC/VAN Deterministic Stress
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
      GOCACHE: ${{ github.workspace }}/.cache/go-build
      GOMODCACHE: ${{ github.workspace }}/.cache/go-mod
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Configure private repo access
        run: git config --global url."https://x-access-token:${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/".insteadOf "ssh://git@github.com/"
      - name: Install mise
        uses: jdx/mise-action@v2
      - name: Cache Rust build (circuits)
        uses: actions/cache@v4
        with:
          path: circuits/target
          key: ${{ runner.os }}-circuits-${{ hashFiles('circuits/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-circuits-
      - name: Cache Go build
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.GOCACHE }}
            ${{ env.GOMODCACHE }}
          key: ${{ runner.os }}-vc-van-deterministic-go-${{ hashFiles('go.sum') }}
          restore-keys: |
            ${{ runner.os }}-vc-van-deterministic-go-
      - name: Build circuits
        run: mise run build:circuits
      - name: Run deterministic VC/VAN tree stress tests
        run: mise run test:tree-stress

  test-e2e:
    name: E2E API Tests
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Configure private repo access
        run: git config --global url."https://x-access-token:${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/".insteadOf "ssh://git@github.com/"
      - name: Install mise
        uses: jdx/mise-action@v2
      - name: Add GOBIN to PATH
        run: echo "$HOME/go/bin" >> $GITHUB_PATH
      - name: Cache Rust build (circuits + e2e-tests)
        uses: actions/cache@v4
        with:
          path: |
            circuits/target
            e2e-tests/target
          key: ${{ runner.os }}-e2e-rust-${{ hashFiles('circuits/Cargo.lock', 'e2e-tests/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-e2e-rust-
      - name: Cache Go build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-e2e-go-${{ hashFiles('go.sum') }}
          restore-keys: |
            ${{ runner.os }}-e2e-go-
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Build and install svoted with FFI
        run: mise run build:install
        env:
          GOCACHE: ${{ github.workspace }}/.cache/go-build
      - name: Build admin UI
        run: cd ui && npm install && npm run build
      - name: Initialize 3-validator chain
        run: mise run chain:init-multi
        env:
          VM_PRIVKEY: ${{ secrets.VM_PRIVKEY }}
      - name: Start 3 validators in background
        run: |
          home="$HOME/.svoted-val1"
          log="/tmp/svoted-val1.log"
          echo "Starting val1 with admin server + UI (home=${home})..."
          SVOTE_PIR_URL=disabled svoted start --home "${home}" --serve-ui --ui-dist ui/dist > "${log}" 2>&1 &
          echo "  PID: $!"
          for i in 2 3; do
            home="$HOME/.svoted-val${i}"
            log="/tmp/svoted-val${i}.log"
            echo "Starting val${i} (home=${home})..."
            SVOTE_PIR_URL=disabled svoted start --home "${home}" > "${log}" 2>&1 &
            echo "  PID: $!"
          done
      - name: Wait for val1 to produce blocks
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:1418/cosmos/base/tendermint/v1beta1/blocks/latest > /dev/null 2>&1; then
              echo "Val1 is producing blocks"
              exit 0
            fi
            echo "Waiting for val1 to start... ($i/60)"
            sleep 2
          done
          echo "Val1 failed to start within 120s"
          cat /tmp/svoted-val1.log
          exit 1
      - name: Register val2 and val3 as validators
        run: |
          create-val-tx --home ~/.svoted-val2 --moniker val2 --amount 10000000usvote --rpc-url tcp://localhost:26157
          echo "Waiting for val2 registration..."
          sleep 6
          create-val-tx --home ~/.svoted-val3 --moniker val3 --amount 10000000usvote --rpc-url tcp://localhost:26157
          echo "Waiting for val3 registration..."
          sleep 6
      - name: Wait for 3-validator set to activate
        run: |
          echo "Waiting for all 3 validators to appear in the active set..."
          for i in $(seq 1 30); do
            VALS=$(curl -sf http://localhost:1418/cosmos/staking/v1beta1/validators?status=BOND_STATUS_BONDED 2>/dev/null \
              | jq '.validators | length' 2>/dev/null || echo "0")
            echo "  Bonded validators: ${VALS} ($i/30)"
            if [ "$VALS" -ge 3 ]; then
              echo "All 3 validators are bonded"
              exit 0
            fi
            sleep 4
          done
          echo "Only ${VALS}/3 validators bonded after 120s"
          exit 1
      - name: Smoke test admin UI and API
        run: |
          echo "Checking UI is served..."
          curl -sf http://localhost:1418/ | grep -q '<div id="root">' || { echo "UI not served"; exit 1; }
          echo "  UI: OK"
          echo "Checking admin API..."
          curl -sf http://localhost:1418/api/voting-config | jq -e '.vote_servers' > /dev/null || { echo "Admin API not responding"; exit 1; }
          echo "  Admin API: OK"
      - name: Run E2E test (round_activation)
        run: |
          export SVOTE_HOME="$HOME/.svoted-val1"
          export SVOTE_PALLAS_PK_PATH="$HOME/.svoted-val1/pallas.pk"
          cargo test --release --manifest-path e2e-tests/Cargo.toml --test round_activation -- --nocapture --ignored --test-threads=1
        env:
          SVOTE_API_URL: http://localhost:1418
          SVOTE_NODE_URL: tcp://localhost:26157
          VM_PRIVKEY: ${{ secrets.VM_PRIVKEY }}
      - name: Run E2E test (voting_flow_zcash_voting)
        run: |
          export SVOTE_HOME="$HOME/.svoted-val1"
          export SVOTE_PALLAS_PK_PATH="$HOME/.svoted-val1/pallas.pk"
          cargo test --release --manifest-path e2e-tests/Cargo.toml --test voting_flow_zcash_voting -- --nocapture --ignored --test-threads=1
        env:
          SVOTE_API_URL: http://localhost:1418
          SVOTE_NODE_URL: tcp://localhost:26157
          HELPER_SERVER_URL: http://localhost:1418
          SVOTE_E2E_VOTE_WINDOW_SECS: "420"
          VM_PRIVKEY: ${{ secrets.VM_PRIVKEY }}
      - name: Upload chain logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: chain-logs
          path: /tmp/svoted-val*.log
          retention-days: 7

  notify-slack:
    name: Slack Notification
    if: ${{ always() && github.ref == 'refs/heads/main' && github.event_name == 'push' && contains(join(needs.*.result, ','), 'failure') }}
    needs: [lint, test-unit, test-helper, test-integration, test-halo2, test-vc-van-deterministic, test-e2e]
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack on failure
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "CI failed on main",
              "blocks": [
                {
                  "type": "header",
                  "text": { "type": "plain_text", "text": "CI Failed on main", "emoji": true }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Workflow:*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|CI>" },
                    { "type": "mrkdwn", "text": "*Branch:*\nmain" },
                    { "type": "mrkdwn", "text": "*Commit:*\n<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|`${{ github.sha }}`>" },
                    { "type": "mrkdwn", "text": "*Author:*\n${{ github.actor }}" }
                  ]
                },
                {
                  "type": "section",
                  "text": { "type": "mrkdwn", "text": "*Job Results:*\nLint: `${{ needs.lint.result }}` | Unit: `${{ needs.test-unit.result }}` | Helper: `${{ needs.test-helper.result }}` | Integration: `${{ needs.test-integration.result }}` | Halo2: `${{ needs.test-halo2.result }}` | VC/VAN: `${{ needs.test-vc-van-deterministic.result }}` | E2E: `${{ needs.test-e2e.result }}`" }
                }
              ]
            }
